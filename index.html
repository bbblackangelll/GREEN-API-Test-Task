<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Test Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Левая колонка: Управление -->
        <div class="left-panel">
            <!-- Глобальные настройки -->
            <div class="form-group">
                <input type="text" id="idInstance" placeholder="idInstance">
            </div>
            <div class="form-group">
                <input type="text" id="apiTokenInstance" placeholder="ApiTokenInstance">
            </div>

            <!-- Методы без параметров -->
            <div class="form-group mt-20">
                <button id="btn-getSettings">getSettings</button>
            </div>
            <div class="form-group">
                <button id="btn-getStateInstance">getStateInstance</button>
            </div>

            <!-- Метод sendMessage -->
            <div class="form-group-card mt-20">
                <input type="text" id="phoneMessage" placeholder="77771234567">
                <textarea id="textMessage" placeholder="Hello World!" rows="3"></textarea>
                <button id="btn-sendMessage">sendMessage</button>
            </div>

            <!-- Метод sendFileByUrl -->
            <div class="form-group-card mt-20">
                <input type="text" id="phoneFile" placeholder="77771234567">
                <input type="text" id="urlFile" placeholder="https://my.site.com/img/horse.png">
                <button id="btn-sendFileByUrl">sendFileByUrl</button>
            </div>
        </div>

        <!-- Правая колонка: Ответ -->
        <div class="right-panel">
            <label for="responseArea">Ответ:</label>
            <textarea id="responseArea" readonly></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
